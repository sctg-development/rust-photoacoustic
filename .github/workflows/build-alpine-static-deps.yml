# This workflow builds static dependencies (zlib, OpenSSL, librdkafka)
# and publishes them as sctg/rust-photoacoustic-static-deps on Docker Hub

name: Build Alpine Static Dependencies

permissions:
    id-token: write
    contents: read
    packages: write

on:
    workflow_dispatch:
    schedule:
        # Run weekly on Monday at 00:00 UTC
        - cron: "0 0 * * 1"

jobs:
    build_static_deps:
        name: Build Static Dependencies
        runs-on: ubuntu-latest
        steps:
            - name: Clean runner for Docker builds
              uses: sctg-development/clean-image-for-docker@v1
              with:
                  remove-development-tools: "true"
                  remove-browsers: "true"
                  remove-databases: "true"
                  remove-cloud-tools: "true"
                  show-top-packages: "true"
            - name: Configure Altium HTTP credentials
              shell: bash
              run: |
                git config --global credential.helper store
                ENCODED=$(python3 -c "
                import urllib.parse, os
                user = urllib.parse.quote(os.environ['ALTIUM_365_USER'], safe='')
                pwd  = urllib.parse.quote(os.environ['ALTIUM_365_PASSWORD'], safe='')
                print(f'https://{user}:{pwd}@afs-vcs-eu1.365.altium.com')
                ")
                echo "$ENCODED" >> ~/.git-credentials
                chmod 600 ~/.git-credentials
                env:
                ALTIUM_365_USER: ${{ secrets.ALTIUM_365_USER }}
                ALTIUM_365_PASSWORD: ${{ secrets.ALTIUM_365_PASSWORD }}

            - name: Check out the repo
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4
              with:
                  platforms: linux/arm64,linux/amd64

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Get version tag
              id: get_tag
              run: |
                  TAG=$(git describe --tags --always 2>/dev/null || echo "latest")
                  echo "tag=$TAG" >> $GITHUB_OUTPUT

            - name: Build and push static-deps image
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./rust/docker/Dockerfile.alpine-3.23-static-deps
                  platforms: linux/arm64,linux/amd64
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  push: true
                  tags: |
                      sctg/rust-photoacoustic-static-deps:latest
                      sctg/rust-photoacoustic-static-deps:${{ steps.get_tag.outputs.tag }}
                  labels: |
                      org.opencontainers.image.title=rust-photoacoustic-static-deps
                      org.opencontainers.image.description=Static dependencies for rust-photoacoustic (zlib, OpenSSL, librdkafka)
                      org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
                      org.opencontainers.image.version=${{ steps.get_tag.outputs.tag }}
