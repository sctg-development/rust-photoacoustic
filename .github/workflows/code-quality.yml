name: Rust Code Quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  fmt_and_clippy:
    name: Format and Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Configure Altium HTTP credentials
        shell: bash
        run: |
          git config --global credential.helper store
          ENCODED=$(python3 -c "
          import urllib.parse, os
          user = urllib.parse.quote(os.environ['ALTIUM_365_USER'], safe='')
          pwd  = urllib.parse.quote(os.environ['ALTIUM_365_PASSWORD'], safe='')
          print(f'https://{user}:{pwd}@afs-vcs-eu1.365.altium.com')
          ")
          echo "$ENCODED" >> ~/.git-credentials
          chmod 600 ~/.git-credentials
        env:
          ALTIUM_365_USER: ${{ secrets.ALTIUM_365_USER }}
          ALTIUM_365_PASSWORD: ${{ secrets.ALTIUM_365_PASSWORD }}

      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Init and update submodules
        shell: bash
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Create base configuration
        run: |
          cp rust/config.example.yaml rust/config.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.1
          components: rustfmt, clippy

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "web/package-lock.json"

      - name: Install Node.js dependencies
        run: |
          cd web
          npm install && npm run build

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libasound2t64 libasound2-dev

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> target"
          key: ${{ runner.os }}-rustfmt-clippy

      - name: Check formatting
        run: |
          cd rust
          cargo fmt -- --check

      - name: Run clippy
        run: |
          cd rust
          cargo clippy
