# Weekly build of static Alpine image for docker-hub publishing
# This is simplified for weekly scheduling; for releases, use release-multiarch.yml

name: Build Alpine Static Rust Photoacoustic (Weekly)

permissions:
  id-token: write
  contents: read
  packages: write

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Monday at 11:00 UTC
    - cron: "0 11 * * 1"

jobs:
  build-alpine-static:
    name: Build and Push Alpine Static Image
    runs-on: ubuntu-latest
    steps:
      - name: Clean runner for Docker builds
        uses: sctg-development/clean-image-for-docker@v1
        with:
          remove-development-tools: "true"
          remove-browsers: "true"
          remove-databases: "true"
          remove-cloud-tools: "true"
          show-top-packages: "true"

      - name: Check out the repo (enable access to local actions)
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Setup repository
        uses: ./.github/actions/setup-repo
        with:
          altium-user: ${{ secrets.ALTIUM_365_USER }}
          altium-password: ${{ secrets.ALTIUM_365_PASSWORD }}
          debug-submodules: "false"

      - name: Setup Docker environment
        uses: ./.github/actions/setup-docker
        with:
          platforms: "linux/amd64,linux/arm64"
          docker-username: ${{ secrets.DOCKER_USERNAME }}
          docker-password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get version tag
        id: get_tag
        run: |
          TAG=$(git describe --tags --always 2>/dev/null || echo "latest")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build and push Alpine static image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./rust/docker/Dockerfile.alpine-3.23
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: |
            sctg/rust-photoacoustic-static:latest
            sctg/rust-photoacoustic-static:${{ steps.get_tag.outputs.tag }}
          labels: |
            org.opencontainers.image.title=rust-photoacoustic-static
            org.opencontainers.image.description=Static Rust binaries for rust-photoacoustic
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.get_tag.outputs.tag }}
