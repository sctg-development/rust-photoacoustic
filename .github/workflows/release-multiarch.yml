# Copyright 2025 SCTG Development - Ronan LE MEILLAT
# This workflow builds multi-architecture static binaries for rust-photoacoustic
# and creates GitHub releases with all photoacoustic tools

name: Generate multi-arch Docker image and release linux binaries

permissions:
  id-token: write
  contents: write
  attestations: write
  packages: write

on:
  release:
    types: [published]
  # Uncomment for manual testing:
  workflow_dispatch:

jobs:
  # Build non-static binaries for multiple platforms
  build_release_binaries:
    name: Build Release Binaries on ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
          - os: macos-15-intel
            target: x86_64-apple-darwin
            cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            cross: true

    steps:
      # Set UTF-8 encoding for Windows to handle Unicode characters in Python scripts
      - name: Set UTF-8 encoding (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "PYTHONIOENCODING=utf-8" >> $env:GITHUB_ENV
          echo "LANG=en_US.UTF-8" >> $env:GITHUB_ENV
          echo "LC_ALL=en_US.UTF-8" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Clean runner for Docker builds
        if: matrix.os == 'ubuntu-latest'
        uses: sctg-development/clean-image-for-docker@v1
        with:
          remove-development-tools: "false"
          remove-browsers: "true"
          remove-databases: "true"
          remove-cloud-tools: "true"
          show-top-packages: "true"

      - name: Configure Altium HTTP credentials
        shell: bash
        run: |
          git config --global credential.helper store
          ENCODED=$(python3 -c "
          import urllib.parse, os
          user = urllib.parse.quote(os.environ['ALTIUM_365_USER'], safe='')
          pwd  = urllib.parse.quote(os.environ['ALTIUM_365_PASSWORD'], safe='')
          print(f'https://{user}:{pwd}@afs-vcs-eu1.365.altium.com')
          ")
          echo "$ENCODED" >> ~/.git-credentials
          chmod 600 ~/.git-credentials
        env:
          ALTIUM_365_USER: ${{ secrets.ALTIUM_365_USER }}
          ALTIUM_365_PASSWORD: ${{ secrets.ALTIUM_365_PASSWORD }}

      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Init and update submodules
        shell: bash
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      # Debug submodules
      - name: Debug submodules
        shell: bash
        run: |
          echo "=== Git submodule status ==="
          git submodule status
          echo "=== .gitmodules content ==="
          cat .gitmodules || echo "No .gitmodules found"
          echo "=== Checking rust directory ==="
          ls -la rust/
          echo "=== Force submodule sync and update ==="
          git submodule sync --recursive
          git submodule update --init --recursive --force
          echo "=== Final submodule status ==="
          git submodule status

      # Install Rust toolchain
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.1
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      # Install dependencies for Linux
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config gcc-aarch64-linux-gnu libasound2-dev

      # Install LLVM and Clang (required for bindgen)
      - name: Install LLVM and Clang
        if: runner.os != 'macOS'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "15"

      # Install Anaconda3 for Python support
      - name: Setup Anaconda3
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.13"
          channels: conda-forge,defaults
          channel-priority: true
          activate-environment: release-env
          use-mamba: false
          conda-solver: classic
          auto-activate-base: true

      # Configure Python environment variables for PyO3
      - name: Configure Python environment
        shell: bash -l {0}
        run: |
          # Activate conda environment
          conda activate release-env

          # Set environment variables
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "PYTHON_SYS_EXECUTABLE=$CONDA/envs/release-env/python.exe" >> $GITHUB_ENV
            echo "PYTHONPATH=$CONDA/envs/release-env/Lib/site-packages" >> $GITHUB_ENV
            echo "$CONDA/envs/release-env/Scripts" >> $GITHUB_PATH
            echo "$CONDA/envs/release-env" >> $GITHUB_PATH
          else
            echo "PYTHON_SYS_EXECUTABLE=$CONDA/envs/release-env/bin/python" >> $GITHUB_ENV
            echo "PYTHONPATH=$CONDA/envs/release-env/lib/python3.13/site-packages" >> $GITHUB_ENV
            echo "$CONDA/envs/release-env/bin" >> $GITHUB_PATH
            
            # Configure dynamic library path for macOS
            if [[ "${{ runner.os }}" == "macOS" ]]; then
              echo "DYLD_LIBRARY_PATH=$CONDA/envs/release-env/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV
            fi
          fi

          # Install required Python packages
          conda install -n release-env numpy scipy matplotlib -y

      # Set release tag
      - name: Set release tag
        id: set_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # For manual workflow dispatch, use nightly tag with current date
            TAG="nightly.$(date +'%Y%m%d')"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "Using nightly tag: $TAG"
          else
            # For release events, use the release tag
            TAG="${{ github.event.release.tag_name }}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "Using release tag: $TAG"
          fi

      # Cache Dependencies
      # - shared-key groups amd64/arm64/macOS caches by target so they don't collide
      # - cache-on-failure saves partial progress even when cargo build fails
      # - Swatinem/rust-cache automatically appends Cargo.lock hash; no need to add it manually
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> target"
          shared-key: rust-release-${{ matrix.target }}
          cache-on-failure: true

      - name: Create base configuration
        run: |
          cp rust/config.example.yaml rust/config.yaml

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "web/package-lock.json"

      - name: Install Node.js dependencies
        run: |
          cd web
          npm install && npm run build

      # Build release binaries
      - name: Build release binaries
        shell: bash -l {0}
        run: |
          cd rust
          # Activate conda environment
          conda activate release-env

          # Configure macOS dynamic library path if needed
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            export DYLD_LIBRARY_PATH="$CONDA/envs/release-env/lib:$DYLD_LIBRARY_PATH"
            echo "DYLD_LIBRARY_PATH set to: $DYLD_LIBRARY_PATH"
          fi

          # Build all binaries in release mode
          cargo build --release --target ${{ matrix.target }} --features python-driver

      # Package binaries with Python dependencies
      - name: Package binaries
        shell: bash -l {0}
        run: |
          cd rust
          conda activate release-env

          # Create package directory
          mkdir -p package/bin
          mkdir -p package/lib

          # Define file extensions based on OS
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            EXE_EXT=".exe"
            LIB_EXT=".dll"
            PYTHON_LIB_NAME="python313.dll"
            PYTHON_LIB_VERSION="3.13"
          else
            EXE_EXT=""
            if [[ "${{ runner.os }}" == "macOS" ]]; then
              LIB_EXT=".dylib"
              PYTHON_LIB_NAME="libpython3.13.dylib"
              PYTHON_LIB_VERSION="3.13"
            else
              LIB_EXT=".so"
              PYTHON_LIB_NAME="libpython3.13.so.1.0"
              PYTHON_LIB_VERSION="3.13"
            fi
          fi

          # Copy all binaries
          for binary in rust_photoacoustic analyze_spectrum create_token debug_config differential filters modbus_client noise_generator pid_tuner redis_viewer rs256keygen standalone; do
            if [ -f "target/${{ matrix.target }}/release/${binary}${EXE_EXT}" ]; then
              cp "target/${{ matrix.target }}/release/${binary}${EXE_EXT}" "package/bin/"
              echo "Packaged binary: ${binary}${EXE_EXT}"
            else
              echo "Binary not found: ${binary}${EXE_EXT}"
            fi
          done

          # Copy Python library
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "$CONDA/envs/release-env/${PYTHON_LIB_NAME}" package/lib/ || echo "Python library not found"
            cp "$CONDA/envs/release-env/Library/bin/python313.dll" package/lib/ || echo "Python313.dll not found"
            cp "$CONDA/envs/release-env/Library/bin/zlib.dll" package/lib/ || echo "zlib.dll not found"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            # For macOS, we need to copy all required dylibs and fix rpath references
            echo "=== Processing macOS dependencies ==="
            CONDA_LIB_DIR="$CONDA/envs/release-env/lib"
            
            # Function to recursively copy and fix dependencies
            fix_macos_dependencies() {
              local binary="$1"
              local processed_libs=""
              
              # Get all dependencies from the binary
              otool_output=$(otool -L "$binary" 2>/dev/null || echo "")
              if [ -z "$otool_output" ]; then
                echo "Failed to process $binary with otool"
                return
              fi
              
              echo "Dependencies for $(basename $binary):"
              echo "$otool_output" | tail -n +2 | awk '{print $1}' | while read lib; do
                # Skip system frameworks and libraries
                if [[ "$lib" == "/System/Library/"* ]] || [[ "$lib" == "/usr/lib/"* ]] || [[ "$lib" == "@rpath/"* ]] || [[ "$lib" == "/opt/homebrew/"* ]]; then
                  # For @rpath references, try to find them in conda env
                  if [[ "$lib" == "@rpath/"* ]]; then
                    lib_name=$(basename "$lib")
                    if [ -f "$CONDA_LIB_DIR/$lib_name" ]; then
                      echo "  Copying @rpath lib: $lib_name"
                      cp "$CONDA_LIB_DIR/$lib_name" package/lib/ 2>/dev/null || true
                      # Update the binary to reference the local lib directory
                      install_name_tool -change "$lib" "@loader_path/../lib/$lib_name" "$binary" 2>/dev/null || true
                    fi
                  fi
                  continue
                fi
                
                # Process non-system libs from conda
                if [ -f "$CONDA_LIB_DIR/$(basename $lib)" ]; then
                  lib_name=$(basename "$lib")
                  echo "  Copying: $lib_name"
                  cp "$CONDA_LIB_DIR/$lib_name" package/lib/ 2>/dev/null || true
                  # Update references in the binary
                  install_name_tool -change "$lib" "@loader_path/../lib/$lib_name" "$binary" 2>/dev/null || true
                elif [[ "$lib" == *".dylib"* ]] || [[ "$lib" == *".so"* ]]; then
                  # Handle absolute paths to conda libs
                  if [[ "$lib" == "$CONDA_LIB_DIR"* ]]; then
                    lib_name=$(basename "$lib")
                    echo "  Copying (absolute path): $lib_name"
                    cp "$lib" package/lib/ 2>/dev/null || true
                    install_name_tool -change "$lib" "@loader_path/../lib/$lib_name" "$binary" 2>/dev/null || true
                  fi
                fi
              done
            }
            
            # Process all binaries
            for binary in package/bin/*; do
              if [ -f "$binary" ]; then
                fix_macos_dependencies "$binary"
              fi
            done
            
            # Also copy libpython explicitly
            if [ -f "$CONDA_LIB_DIR/$PYTHON_LIB_NAME" ]; then
              cp "$CONDA_LIB_DIR/$PYTHON_LIB_NAME" package/lib/
              echo "Copied main Python library: $PYTHON_LIB_NAME"
            fi
            
            # Now fix internal dependencies of the copied libraries themselves
            echo "=== Fixing internal library dependencies ==="
            for lib in package/lib/*.dylib; do
              if [ -f "$lib" ]; then
                echo "Processing library: $(basename $lib)"
                otool_output=$(otool -L "$lib" 2>/dev/null || echo "")
                if [ -n "$otool_output" ]; then
                  echo "$otool_output" | tail -n +2 | awk '{print $1}' | while read deplib; do
                    # Skip system frameworks
                    if [[ "$deplib" == "/System/Library/"* ]] || [[ "$deplib" == "/usr/lib/"* ]] || [[ "$deplib" == "@loader_path/"* ]]; then
                      continue
                    fi
                    
                    # Handle @rpath references in libraries
                    if [[ "$deplib" == "@rpath/"* ]]; then
                      lib_name=$(basename "$deplib")
                      if [ -f "$CONDA_LIB_DIR/$lib_name" ] && [ ! -f "package/lib/$lib_name" ]; then
                        cp "$CONDA_LIB_DIR/$lib_name" package/lib/ 2>/dev/null || true
                        echo "  Copied transitive dep: $lib_name"
                      fi
                      # Update the library to use @loader_path
                      install_name_tool -change "$deplib" "@loader_path/$lib_name" "$lib" 2>/dev/null || true
                    elif [[ "$deplib" == "$CONDA_LIB_DIR"* ]]; then
                      lib_name=$(basename "$deplib")
                      install_name_tool -change "$deplib" "@loader_path/$lib_name" "$lib" 2>/dev/null || true
                    fi
                  done
                fi
              fi
            done
            
          else
            # Linux
            cp "$CONDA/envs/release-env/lib/${PYTHON_LIB_NAME}" package/lib/ || echo "Python library not found"
          fi

          # Create launch scripts for all binaries
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            # Windows batch scripts
            for binary in rust_photoacoustic analyze_spectrum create_token debug_config differential filters modbus_client noise_generator pid_tuner redis_viewer rs256keygen standalone; do
              if [ -f "package/bin/${binary}.exe" ]; then
                # Create batch script directly with correct binary name
                echo "@echo off" > "package/${binary}.bat"
                echo "set SCRIPT_DIR=%~dp0" >> "package/${binary}.bat"
                echo "set PATH=%SCRIPT_DIR%lib;%PATH%" >> "package/${binary}.bat"
                echo "\"%SCRIPT_DIR%bin\\${binary}.exe\" %*" >> "package/${binary}.bat"
                echo "Created launch script: ${binary}.bat"
              fi
            done
          else
            # Unix shell scripts
            for binary in rust_photoacoustic analyze_spectrum create_token debug_config differential filters modbus_client noise_generator pid_tuner redis_viewer rs256keygen standalone; do
              if [ -f "package/bin/${binary}" ]; then
                # Create shell script directly with correct binary name
                echo "#!/bin/bash" > "package/${binary}"
                echo 'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' >> "package/${binary}"
                echo 'if [[ "$OSTYPE" == "darwin"* ]]; then' >> "package/${binary}"
                echo '    export DYLD_LIBRARY_PATH="${SCRIPT_DIR}/lib:${DYLD_LIBRARY_PATH}"' >> "package/${binary}"
                echo 'else' >> "package/${binary}"
                echo '    export LD_LIBRARY_PATH="${SCRIPT_DIR}/lib:${LD_LIBRARY_PATH}"' >> "package/${binary}"
                echo 'fi' >> "package/${binary}"
                echo "exec \"\${SCRIPT_DIR}/bin/${binary}\" \"\$@\"" >> "package/${binary}"
                chmod +x "package/${binary}"
                echo "Created launch script: ${binary}"
              fi
            done
          fi

          # Create README
          cat > package/README.md << 'EOF'
          # Rust Photoacoustic - Release Package

          This package contains the Rust Photoacoustic binaries with Python integration.

          ## Contents

          - `bin/`: Executable binaries
          - `lib/`: Required Python libraries  
          - Launch scripts for easy execution

          ## Available Tools

          - **rust_photoacoustic**: Main photoacoustic analysis server
          - **analyze_spectrum**: Spectrum analysis tool
          - **create_token**: JWT token generation utility
          - **debug_config**: Configuration debugging utility
          - **differential**: Differential signal processing
          - **filters**: Signal filtering utilities
          - **modbus_client**: Modbus communication client
          - **noise_generator**: Noise generation for testing
          - **pid_tuner**: PID controller tuning tool
          - **redis_viewer**: Redis data viewer
          - **rs256keygen**: RS256 key generation utility
          - **standalone**: Standalone analysis tool

          ## Usage

          ### On Windows:
          ```
          rust_photoacoustic.bat [options]
          pid_tuner.bat [options]
          analyze_spectrum.bat [options]
          # ... (other tools available with .bat extension)
          ```

          ### On macOS/Linux:
          ```
          # First remove quarantine attribute on macOS
          sudo xattr -r -d com.apple.quarantine *
          ./rust_photoacoustic [options]
          ./pid_tuner [options]
          ./analyze_spectrum [options]
          # ... (other tools available as executable scripts)
          ```

          ## Requirements

          - No additional Python installation required
          - All dependencies are included in this package
          EOF

          # Add build info to README
          echo "" >> package/README.md
          echo "## Version" >> package/README.md
          echo "" >> package/README.md
          echo "Built from: ${{ github.sha }}" >> package/README.md
          echo "Target: ${{ matrix.target }}" >> package/README.md
          echo "Build Date: $(date)" >> package/README.md

          # Create archive
          ARCHIVE_NAME="rust-photoacoustic-${{ steps.set_tag.outputs.tag }}-${{ matrix.target }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a "${ARCHIVE_NAME}.zip" package/*
            echo "ARCHIVE_PATH=${ARCHIVE_NAME}.zip" >> $GITHUB_ENV
          else
            tar -czf "${ARCHIVE_NAME}.tar.gz" -C package .
            echo "ARCHIVE_PATH=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
          fi

      # Upload artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-photoacoustic-${{ matrix.target }}
          path: rust/${{ env.ARCHIVE_PATH }}
          retention-days: 90

  build_and_release_docker:
    permissions:
      id-token: write
      contents: write
      packages: write
      attestations: write
    name: Push Docker image to Docker Hub and release binaries
    runs-on: ubuntu-latest
    needs: build_release_binaries
    env:
      DOCKER_ARMHF_EXPERIMENTAL: off # Set to 'enabled' to enable armhf build
      INDIVIDUAL_STATIC_RELEASES: off # Set to 'enabled' to enable individual static releases
    steps:
      - name: Clean runner for Docker builds
        uses: sctg-development/clean-image-for-docker@v1
        # Optional parameters
        with:
          remove-development-tools: "true"
          remove-browsers: "true"
          remove-databases: "true"
          remove-cloud-tools: "true"
          show-top-packages: "true"

      - name: Configure Altium HTTP credentials
        shell: bash
        run: |
          git config --global credential.helper store
          ENCODED=$(python3 -c "
          import urllib.parse, os
          user = urllib.parse.quote(os.environ['ALTIUM_365_USER'], safe='')
          pwd  = urllib.parse.quote(os.environ['ALTIUM_365_PASSWORD'], safe='')
          print(f'https://{user}:{pwd}@afs-vcs-eu1.365.altium.com')
          ")
          echo "$ENCODED" >> ~/.git-credentials
          chmod 600 ~/.git-credentials
        env:
          ALTIUM_365_USER: ${{ secrets.ALTIUM_365_USER }}
          ALTIUM_365_PASSWORD: ${{ secrets.ALTIUM_365_PASSWORD }}

      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 0

      - name: Init and update submodules
        shell: bash
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Set release tag
        id: set_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # For manual workflow dispatch, use nightly tag with current date
            TAG="nightly.$(date +'%Y%m%d')"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "Using nightly tag: $TAG"
          else
            # For release events, use the release tag
            TAG="${{ github.event.release.tag_name }}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "Using release tag: $TAG"
          fi

      - name: Create release for nightly builds
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.set_tag.outputs.tag }}
          echo "Creating nightly release: $TAG"
          gh release create "$TAG" --title "Nightly Build $TAG" --notes "Automated nightly build of rust-photoacoustic with multi-architecture static binaries." --prerelease

      # Download release artifacts from build job
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      # Upload non-static binaries to release
      - name: Upload release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.set_tag.outputs.tag }}
          echo "Uploading release artifacts for tag: $TAG"

          # Upload all downloaded artifacts
          for artifact_dir in artifacts/*/; do
            if [ -d "$artifact_dir" ]; then
              echo "Processing artifact directory: $artifact_dir"
              for file in "$artifact_dir"*; do
                if [ -f "$file" ]; then
                  echo "Uploading: $file"
                  gh release upload "$TAG" "$file" --clobber
                fi
              done
            fi
          done

      - name: Set Docker platforms
        id: set_platforms
        run: |
          if [ "${{ env.DOCKER_ARMHF_EXPERIMENTAL }}" = "enabled" ]; then
            echo "platforms=linux/arm64,linux/amd64,linux/arm/v7" >> $GITHUB_OUTPUT
            echo "Using platforms with armhf: linux/arm64,linux/amd64,linux/arm/v7"
          else
            echo "platforms=linux/arm64,linux/amd64" >> $GITHUB_OUTPUT
            echo "Using platforms without armhf: linux/arm64,linux/amd64"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ steps.set_platforms.outputs.platforms }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./rust/docker/Dockerfile.trixie
          platforms: ${{ steps.set_platforms.outputs.platforms }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          build-args: |
            GIT_COMMIT_HASH_SHORT=${{ github.sha }}
            GIT_COMMIT_HASH_FULL=${{ github.sha }}
            GIT_COMMIT_DATE=${{ github.event.repository.updated_at }}
            VERSION=${{ steps.set_tag.outputs.tag }}
          tags: sctg/rust-photoacoustic:${{ steps.set_tag.outputs.tag }}
          labels: |
            org.opencontainers.image.title=rust-photoacoustic
            org.opencontainers.image.description=Photoacoustic signal processing
            org.opencontainers.image.version=${{ steps.set_tag.outputs.tag }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Pull and extract files from Docker image (amd64)
        continue-on-error: true
        run: |
          export TAG=${{ steps.set_tag.outputs.tag }}
          mkdir -p /tmp/amd64/
          docker pull sctg/rust-photoacoustic:${TAG}
          docker create --platform linux/amd64 --name temp-container-amd64 sctg/rust-photoacoustic:${TAG}

          # Extract all photoacoustic binaries
          docker cp temp-container-amd64:/usr/local/bin/create_token /tmp/amd64/ || echo "create_token not found"
          docker cp temp-container-amd64:/usr/local/bin/analyze_spectrum /tmp/amd64/ || echo "analyze_spectrum not found"
          docker cp temp-container-amd64:/usr/local/bin/debug_config /tmp/amd64/ || echo "debug_config not found"
          docker cp temp-container-amd64:/usr/local/bin/differential /tmp/amd64/ || echo "differential not found"
          docker cp temp-container-amd64:/usr/local/bin/filters /tmp/amd64/ || echo "filters not found"
          docker cp temp-container-amd64:/usr/local/bin/modbus_client /tmp/amd64/ || echo "modbus_client not found"
          docker cp temp-container-amd64:/usr/local/bin/noise_generator /tmp/amd64/ || echo "noise_generator not found"
          docker cp temp-container-amd64:/usr/local/bin/pid_tuner /tmp/amd64/ || echo "pid_tuner not found"
          docker cp temp-container-amd64:/usr/local/bin/redis_viewer /tmp/amd64/ || echo "redis_viewer not found"
          docker cp temp-container-amd64:/usr/local/bin/rs256keygen /tmp/amd64/ || echo "rs256keygen not found"
          docker cp temp-container-amd64:/usr/local/bin/rust_photoacoustic /tmp/amd64/ || echo "rust_photoacoustic not found"
          docker cp temp-container-amd64:/usr/local/bin/standalone /tmp/amd64/ || echo "standalone not found"
          # copy also the python binary and libpython static library
