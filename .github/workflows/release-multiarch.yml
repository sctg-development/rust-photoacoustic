# Multi-architecture release workflow: native builds + static Docker builds
# Produces release with binaries for 8 targets (4 native + 2 Docker × 2 archs)

name: Generate multi-arch Docker image and release linux binaries

permissions:
  id-token: write
  contents: write
  attestations: write
  packages: write

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # Compute release tag once, share via output
  compute-tag:
    name: Compute Release Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
    steps:
      - name: Set release tag
        id: set_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="nightly.$(date +'%Y%m%d')"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "Using nightly tag: $TAG"
          else
            TAG="${{ github.event.release.tag_name }}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "Using release tag: $TAG"
          fi

  # Native builds: ubuntu, windows, macos (intel + arm64)
  build-native:
    name: Build Release Binaries on ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: compute-tag

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
          - os: macos-15-intel
            target: x86_64-apple-darwin
            cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            cross: true

    steps:
      # Set UTF-8 encoding for Windows to handle Unicode characters in Python scripts
      - name: Set UTF-8 encoding (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "PYTHONIOENCODING=utf-8" >> $env:GITHUB_ENV
          echo "LANG=en_US.UTF-8" >> $env:GITHUB_ENV
          echo "LC_ALL=en_US.UTF-8" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Clean runner for Docker builds
        if: matrix.os == 'ubuntu-latest'
        uses: sctg-development/clean-image-for-docker@v1
        with:
          remove-development-tools: "false"
          remove-browsers: "true"
          remove-databases: "true"
          remove-cloud-tools: "true"
          show-top-packages: "true"

      - name: Setup repository
        uses: ./.github/actions/setup-repo
        with:
          altium-user: ${{ secrets.ALTIUM_365_USER }}
          altium-password: ${{ secrets.ALTIUM_365_PASSWORD }}
          debug-submodules: "false"

      # Install Rust toolchain
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.1
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      # Install dependencies for Linux
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config gcc-aarch64-linux-gnu libasound2-dev

      # Install LLVM and Clang (required for bindgen)
      - name: Install LLVM and Clang
        if: runner.os != 'macOS'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "15"

      # Install Anaconda3 for Python support
      - name: Setup Anaconda3
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.13"
          channels: conda-forge,defaults
          channel-priority: true
          activate-environment: release-env
          use-mamba: false
          conda-solver: classic
          auto-activate-base: true

      # Configure Python environment variables for PyO3
      - name: Configure Python environment
        shell: bash -l {0}
        run: |
          # Activate conda environment
          conda activate release-env

          # Set environment variables
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "PYTHON_SYS_EXECUTABLE=$CONDA/envs/release-env/python.exe" >> $GITHUB_ENV
            echo "PYTHONPATH=$CONDA/envs/release-env/Lib/site-packages" >> $GITHUB_ENV
            echo "$CONDA/envs/release-env/Scripts" >> $GITHUB_PATH
            echo "$CONDA/envs/release-env" >> $GITHUB_PATH
          else
            echo "PYTHON_SYS_EXECUTABLE=$CONDA/envs/release-env/bin/python" >> $GITHUB_ENV
            echo "PYTHONPATH=$CONDA/envs/release-env/lib/python3.13/site-packages" >> $GITHUB_ENV
            echo "$CONDA/envs/release-env/bin" >> $GITHUB_PATH

            # Configure dynamic library path for macOS
            if [[ "${{ runner.os }}" == "macOS" ]]; then
              echo "DYLD_LIBRARY_PATH=$CONDA/envs/release-env/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV
            fi
          fi

          # Install required Python packages
          conda install -n release-env numpy scipy matplotlib -y

      # Cache Dependencies
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> target"
          shared-key: rust-release-${{ matrix.target }}
          cache-on-failure: true

      - name: Create base configuration
        run: |
          cp rust/config.example.yaml rust/config.yaml

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "web/package-lock.json"

      - name: Install Node.js dependencies
        run: |
          cd web
          npm install && npm run build

      # Build release binaries
      - name: Build release binaries
        shell: bash -l {0}
        run: |
          cd rust
          # Activate conda environment
          conda activate release-env

          # Configure macOS dynamic library path if needed
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            export DYLD_LIBRARY_PATH="$CONDA/envs/release-env/lib:$DYLD_LIBRARY_PATH"
            echo "DYLD_LIBRARY_PATH set to: $DYLD_LIBRARY_PATH"
          fi

          # Build all binaries in release mode
          cargo build --release --target ${{ matrix.target }} --features python-driver

      # Package binaries with Python dependencies
      - name: Package binaries
        shell: bash -l {0}
        run: |
          cd rust
          conda activate release-env

          # Create package directory
          mkdir -p package/bin
          mkdir -p package/lib

          # Define file extensions based on OS
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            EXE_EXT=".exe"
            LIB_EXT=".dll"
            PYTHON_LIB_NAME="python313.dll"
          else
            EXE_EXT=""
            if [[ "${{ runner.os }}" == "macOS" ]]; then
              LIB_EXT=".dylib"
              PYTHON_LIB_NAME="libpython3.13.dylib"
            else
              LIB_EXT=".so"
              PYTHON_LIB_NAME="libpython3.13.so.1.0"
            fi
          fi

          # Copy all binaries
          for binary in rust_photoacoustic analyze_spectrum create_token debug_config differential filters modbus_client noise_generator pid_tuner redis_viewer rs256keygen standalone; do
            if [ -f "target/${{ matrix.target }}/release/${binary}${EXE_EXT}" ]; then
              cp "target/${{ matrix.target }}/release/${binary}${EXE_EXT}" "package/bin/"
              echo "Packaged binary: ${binary}${EXE_EXT}"
            else
              echo "Binary not found: ${binary}${EXE_EXT}"
            fi
          done

          # Copy Python library
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "$CONDA/envs/release-env/${PYTHON_LIB_NAME}" package/lib/ || echo "Python library not found"
            cp "$CONDA/envs/release-env/Library/bin/python313.dll" package/lib/ || echo "Python313.dll not found"
            cp "$CONDA/envs/release-env/Library/bin/zlib.dll" package/lib/ || echo "zlib.dll not found"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "=== Processing macOS dependencies ==="
            CONDA_LIB_DIR="$CONDA/envs/release-env/lib"

            # Function to recursively copy and fix dependencies
            fix_macos_dependencies() {
              local binary="$1"
              local processed_libs=""

              # Get all dependencies from the binary
              otool_output=$(otool -L "$binary" 2>/dev/null || echo "")
              if [ -z "$otool_output" ]; then
                echo "Failed to process $binary with otool"
                return
              fi

              echo "Dependencies for $(basename $binary):"
              echo "$otool_output" | tail -n +2 | awk '{print $1}' | while read lib; do
                # Skip system frameworks and libraries
                if [[ "$lib" == "/System/Library/"* ]] || [[ "$lib" == "/usr/lib/"* ]] || [[ "$lib" == "@rpath/"* ]] || [[ "$lib" == "/opt/homebrew/"* ]]; then
                  # For @rpath references, try to find them in conda env
                  if [[ "$lib" == "@rpath/"* ]]; then
                    lib_name=$(basename "$lib")
                    if [ -f "$CONDA_LIB_DIR/$lib_name" ]; then
                      echo "  Copying @rpath lib: $lib_name"
                      cp "$CONDA_LIB_DIR/$lib_name" package/lib/ 2>/dev/null || true
                      install_name_tool -change "$lib" "@loader_path/../lib/$lib_name" "$binary" 2>/dev/null || true
                    fi
                  fi
                  continue
                fi

                # Process non-system libs from conda
                if [ -f "$CONDA_LIB_DIR/$(basename $lib)" ]; then
                  lib_name=$(basename "$lib")
                  echo "  Copying: $lib_name"
                  cp "$CONDA_LIB_DIR/$lib_name" package/lib/ 2>/dev/null || true
                  install_name_tool -change "$lib" "@loader_path/../lib/$lib_name" "$binary" 2>/dev/null || true
                elif [[ "$lib" == *".dylib"* ]] || [[ "$lib" == *".so"* ]]; then
                  # Handle absolute paths to conda libs
                  if [[ "$lib" == "$CONDA_LIB_DIR"* ]]; then
                    lib_name=$(basename "$lib")
                    echo "  Copying (absolute path): $lib_name"
                    cp "$lib" package/lib/ 2>/dev/null || true
                    install_name_tool -change "$lib" "@loader_path/../lib/$lib_name" "$binary" 2>/dev/null || true
                  fi
                fi
              done
            }

            # Process all binaries
            for binary in package/bin/*; do
              if [ -f "$binary" ]; then
                fix_macos_dependencies "$binary"
              fi
            done

            # Also copy libpython explicitly
            if [ -f "$CONDA_LIB_DIR/$PYTHON_LIB_NAME" ]; then
              cp "$CONDA_LIB_DIR/$PYTHON_LIB_NAME" package/lib/
              echo "Copied main Python library: $PYTHON_LIB_NAME"
            fi

            # Now fix internal dependencies of the copied libraries themselves
            echo "=== Fixing internal library dependencies ==="
            for lib in package/lib/*.dylib; do
              if [ -f "$lib" ]; then
                echo "Processing library: $(basename $lib)"
                otool_output=$(otool -L "$lib" 2>/dev/null || echo "")
                if [ -n "$otool_output" ]; then
                  echo "$otool_output" | tail -n +2 | awk '{print $1}' | while read deplib; do
                    # Skip system frameworks
                    if [[ "$deplib" == "/System/Library/"* ]] || [[ "$deplib" == "/usr/lib/"* ]] || [[ "$deplib" == "@loader_path/"* ]]; then
                      continue
                    fi

                    # Handle @rpath references in libraries
                    if [[ "$deplib" == "@rpath/"* ]]; then
                      lib_name=$(basename "$deplib")
                      if [ -f "$CONDA_LIB_DIR/$lib_name" ] && [ ! -f "package/lib/$lib_name" ]; then
                        cp "$CONDA_LIB_DIR/$lib_name" package/lib/ 2>/dev/null || true
                        echo "  Copied transitive dep: $lib_name"
                      fi
                      install_name_tool -change "$deplib" "@loader_path/$lib_name" "$lib" 2>/dev/null || true
                    elif [[ "$deplib" == "$CONDA_LIB_DIR"* ]]; then
                      lib_name=$(basename "$deplib")
                      install_name_tool -change "$deplib" "@loader_path/$lib_name" "$lib" 2>/dev/null || true
                    fi
                  done
                fi
              fi
            done

          else
            # Linux
            cp "$CONDA/envs/release-env/lib/${PYTHON_LIB_NAME}" package/lib/ || echo "Python library not found"
          fi

          # Create launch scripts
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            # Windows batch scripts
            for binary in rust_photoacoustic analyze_spectrum create_token debug_config differential filters modbus_client noise_generator pid_tuner redis_viewer rs256keygen standalone; do
              if [ -f "package/bin/${binary}.exe" ]; then
                echo "@echo off" > "package/${binary}.bat"
                echo "set SCRIPT_DIR=%~dp0" >> "package/${binary}.bat"
                echo "set PATH=%SCRIPT_DIR%lib;%PATH%" >> "package/${binary}.bat"
                echo "\"%SCRIPT_DIR%bin\\${binary}.exe\" %*" >> "package/${binary}.bat"
                echo "Created launch script: ${binary}.bat"
              fi
            done
          else
            # Unix shell scripts
            for binary in rust_photoacoustic analyze_spectrum create_token debug_config differential filters modbus_client noise_generator pid_tuner redis_viewer rs256keygen standalone; do
              if [ -f "package/bin/${binary}" ]; then
                echo "#!/bin/bash" > "package/${binary}"
                echo 'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' >> "package/${binary}"
                echo 'if [[ "$OSTYPE" == "darwin"* ]]; then' >> "package/${binary}"
                echo '    export DYLD_LIBRARY_PATH="${SCRIPT_DIR}/lib:${DYLD_LIBRARY_PATH}"' >> "package/${binary}"
                echo 'else' >> "package/${binary}"
                echo '    export LD_LIBRARY_PATH="${SCRIPT_DIR}/lib:${LD_LIBRARY_PATH}"' >> "package/${binary}"
                echo 'fi' >> "package/${binary}"
                echo "exec \"\${SCRIPT_DIR}/bin/${binary}\" \"\$@\"" >> "package/${binary}"
                chmod +x "package/${binary}"
                echo "Created launch script: ${binary}"
              fi
            done
          fi

          # Create archive
          ARCHIVE_NAME="rust-photoacoustic-${{ needs.compute-tag.outputs.tag }}-${{ matrix.target }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a "${ARCHIVE_NAME}.zip" package/*
            echo "ARCHIVE_PATH=${ARCHIVE_NAME}.zip" >> $GITHUB_ENV
          else
            tar -czf "${ARCHIVE_NAME}.tar.gz" -C package .
            echo "ARCHIVE_PATH=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
          fi

      # Upload artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-photoacoustic-${{ matrix.target }}
          path: rust/${{ env.ARCHIVE_PATH }}
          retention-days: 90

  # Docker build: Trixie (Debian)
  build-trixie:
    name: Build Docker Image (Trixie)
    runs-on: ubuntu-latest
    needs: compute-tag
    permissions:
      id-token: write
      contents: write
      packages: write

    steps:
      - name: Clean runner for Docker builds
        uses: sctg-development/clean-image-for-docker@v1
        with:
          remove-development-tools: "true"
          remove-browsers: "true"
          remove-databases: "true"
          remove-cloud-tools: "true"
          show-top-packages: "true"

      - name: Setup repository
        uses: ./.github/actions/setup-repo
        with:
          altium-user: ${{ secrets.ALTIUM_365_USER }}
          altium-password: ${{ secrets.ALTIUM_365_PASSWORD }}
          debug-submodules: "false"

      - name: Setup Docker environment
        uses: ./.github/actions/setup-docker
        with:
          platforms: "linux/amd64,linux/arm64"
          docker-username: ${{ secrets.DOCKER_USERNAME }}
          docker-password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Trixie image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./rust/docker/Dockerfile.trixie
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          build-args: |
            GIT_COMMIT_HASH_SHORT=${{ github.sha }}
            GIT_COMMIT_HASH_FULL=${{ github.sha }}
            GIT_COMMIT_DATE=${{ github.event.repository.updated_at }}
            VERSION=${{ needs.compute-tag.outputs.tag }}
          tags: |
            sctg/rust-photoacoustic:${{ needs.compute-tag.outputs.tag }}
            sctg/rust-photoacoustic:latest
          labels: |
            org.opencontainers.image.title=rust-photoacoustic
            org.opencontainers.image.description=Photoacoustic signal processing
            org.opencontainers.image.version=${{ needs.compute-tag.outputs.tag }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Extract Trixie binaries (amd64)
        uses: ./.github/actions/extract-docker-arch
        with:
          image: sctg/rust-photoacoustic
          arch: amd64
          tag: ${{ needs.compute-tag.outputs.tag }}
          archive-suffix: x86_64-unknown-linux-gnu
          extract-deb: "true"
          extract-python-static: "false"

      - name: Extract Trixie binaries (arm64)
        uses: ./.github/actions/extract-docker-arch
        with:
          image: sctg/rust-photoacoustic
          arch: arm64
          tag: ${{ needs.compute-tag.outputs.tag }}
          archive-suffix: aarch64-unknown-linux-gnu
          extract-deb: "true"
          extract-python-static: "false"

      - name: Upload .deb packages to artifacts
        shell: bash
        run: |
          mkdir -p /tmp/artifacts
          ls -la /tmp/amd64/ /tmp/arm64/ 2>/dev/null || true
          # Artifacts are already uploaded by extract-docker-arch action

  # Docker build: Alpine (musl static)
  build-alpine:
    name: Build Docker Image (Alpine static)
    runs-on: ubuntu-latest
    needs: compute-tag
    permissions:
      id-token: write
      contents: write
      packages: write

    steps:
      - name: Clean runner for Docker builds
        uses: sctg-development/clean-image-for-docker@v1
        with:
          remove-development-tools: "true"
          remove-browsers: "true"
          remove-databases: "true"
          remove-cloud-tools: "true"
          show-top-packages: "true"

      - name: Setup repository
        uses: ./.github/actions/setup-repo
        with:
          altium-user: ${{ secrets.ALTIUM_365_USER }}
          altium-password: ${{ secrets.ALTIUM_365_PASSWORD }}
          debug-submodules: "false"

      - name: Setup Docker environment
        uses: ./.github/actions/setup-docker
        with:
          platforms: "linux/amd64,linux/arm64"
          docker-username: ${{ secrets.DOCKER_USERNAME }}
          docker-password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Alpine image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./rust/docker/Dockerfile.alpine-3.23
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          build-args: |
            GIT_COMMIT_HASH_SHORT=${{ github.sha }}
            GIT_COMMIT_HASH_FULL=${{ github.sha }}
            GIT_COMMIT_DATE=${{ github.event.repository.updated_at }}
            VERSION=${{ needs.compute-tag.outputs.tag }}
          tags: |
            sctg/rust-photoacoustic-static:${{ needs.compute-tag.outputs.tag }}
            sctg/rust-photoacoustic-static:latest
          labels: |
            org.opencontainers.image.title=rust-photoacoustic-static
            org.opencontainers.image.description=Static Rust binaries for rust-photoacoustic
            org.opencontainers.image.version=${{ needs.compute-tag.outputs.tag }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Extract Alpine binaries (amd64)
        uses: ./.github/actions/extract-docker-arch
        with:
          image: sctg/rust-photoacoustic-static
          arch: amd64
          tag: ${{ needs.compute-tag.outputs.tag }}
          archive-suffix: x86_64-unknown-linux-musl
          extract-deb: "false"
          extract-python-static: "true"

      - name: Extract Alpine binaries (arm64)
        uses: ./.github/actions/extract-docker-arch
        with:
          image: sctg/rust-photoacoustic-static
          arch: arm64
          tag: ${{ needs.compute-tag.outputs.tag }}
          archive-suffix: aarch64-unknown-linux-musl
          extract-deb: "false"
          extract-python-static: "true"

  # Release: upload all artifacts
  release:
    name: Upload Release Artifacts
    runs-on: ubuntu-latest
    needs: [compute-tag, build-native, build-trixie, build-alpine]
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Setup repository
        uses: ./.github/actions/setup-repo
        with:
          altium-user: ${{ secrets.ALTIUM_365_USER }}
          altium-password: ${{ secrets.ALTIUM_365_PASSWORD }}
          debug-submodules: "false"

      - name: Create nightly release
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ needs.compute-tag.outputs.tag }}
          echo "Creating nightly release: $TAG"
          gh release create "$TAG" --title "Nightly Build $TAG" --notes "Automated nightly build of rust-photoacoustic with multi-architecture binaries." --prerelease

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Upload release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ needs.compute-tag.outputs.tag }}
          echo "Uploading release artifacts for tag: $TAG"

          # Upload all artifacts recursively
          for artifact_dir in artifacts/*/; do
            if [ -d "$artifact_dir" ]; then
              echo "Processing artifact directory: $artifact_dir"
              for file in "$artifact_dir"*; do
                if [ -f "$file" ]; then
                  echo "Uploading: $(basename $file)"
                  gh release upload "$TAG" "$file" --clobber
                fi
              done
            fi
          done

      - name: Create attestation for release binaries
        uses: actions/attest-build-provenance@v1
        continue-on-error: true
        with:
          subject-path: artifacts/**/*

      - name: Generate release summary
        run: |
          echo "## 🚀 Multi-Architecture Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Released Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Type | Container | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Linux x86_64 (Trixie)** | Dynamic | ✅ sctg/rust-photoacoustic:${{ needs.compute-tag.outputs.tag }} | $([ -f artifacts/docker-binaries-amd64/*gnu.tar.gz ] && echo '✅' || echo '⏳')" >> $GITHUB_STEP_SUMMARY
          echo "| **Linux arm64 (Trixie)** | Dynamic | ✅ sctg/rust-photoacoustic:${{ needs.compute-tag.outputs.tag }} | $([ -f artifacts/docker-binaries-arm64/*gnu.tar.gz ] && echo '✅' || echo '⏳')" >> $GITHUB_STEP_SUMMARY
          echo "| **Linux x86_64 (Alpine)** | Static musl | ✅ sctg/rust-photoacoustic-static:${{ needs.compute-tag.outputs.tag }} | $([ -f artifacts/docker-binaries-amd64/*musl.tar.gz ] && echo '✅' || echo '⏳')" >> $GITHUB_STEP_SUMMARY
          echo "| **Linux arm64 (Alpine)** | Static musl | ✅ sctg/rust-photoacoustic-static:${{ needs.compute-tag.outputs.tag }} | $([ -f artifacts/docker-binaries-arm64/*musl.tar.gz ] && echo '✅' || echo '⏳')" >> $GITHUB_STEP_SUMMARY
          echo "| **Windows x64** | Dynamic | N/A | $([ -f artifacts/rust-photoacoustic-x86_64-pc-windows-msvc/*.zip ] && echo '✅' || echo '⏳')" >> $GITHUB_STEP_SUMMARY
          echo "| **macOS Intel** | Dynamic | N/A | $([ -f artifacts/rust-photoacoustic-x86_64-apple-darwin/*.tar.gz ] && echo '✅' || echo '⏳')" >> $GITHUB_STEP_SUMMARY
          echo "| **macOS Apple Silicon** | Dynamic | N/A | $([ -f artifacts/rust-photoacoustic-aarch64-apple-darwin/*.tar.gz ] && echo '✅' || echo '⏳')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Available Tools" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- rust_photoacoustic, analyze_spectrum, create_token, debug_config, differential" >> $GITHUB_STEP_SUMMARY
          echo "- filters, modbus_client, noise_generator, pid_tuner, redis_viewer, rs256keygen, standalone" >> $GITHUB_STEP_SUMMARY
